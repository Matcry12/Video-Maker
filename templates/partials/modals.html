<div id="outputPickerBackdrop" class="output-picker-backdrop" hidden onclick="onOutputPickerBackdropClick(event)">
    <div class="output-picker-modal" role="dialog" aria-modal="true" aria-label="All videos">
        <div class="output-picker-header">
            <h3 class="output-picker-title">Select Video</h3>
            <button class="btn-secondary btn-small" type="button" onclick="closeOutputPicker()">Close</button>
        </div>
        <div id="outputPickerList" class="output-picker-list">
            <p class="output-empty">No videos yet.</p>
        </div>
    </div>
</div>

<div id="scriptPickerBackdrop" class="output-picker-backdrop" hidden onclick="onScriptPickerBackdropClick(event)">
    <div class="output-picker-modal" role="dialog" aria-modal="true" aria-label="All scripts">
        <div class="output-picker-header">
            <h3 class="output-picker-title">Select Script</h3>
            <button class="btn-secondary btn-small" type="button" onclick="closeScriptPicker()">Close</button>
        </div>
        <div id="scriptPickerList" class="output-picker-list">
            <p class="output-empty">No scripts yet.</p>
        </div>
    </div>
</div>
