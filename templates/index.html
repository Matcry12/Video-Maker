<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Maker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/editor.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/output.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/responsive.css') }}">
</head>
<body>
    <div class="container">
        <header class="topbar">
                <div class="topbar-main">
                    <h1 class="app-title">Video Maker</h1>
                    <div class="topbar-script">
                        <label for="scriptName">Script</label>
                        <input type="text" id="scriptName" placeholder="my_video" value="">
                    </div>
                    <span id="saveState" class="save-state is-saved">Saved</span>
                    <span id="sourceBadge" class="source-badge" hidden></span>
                </div>
            <div class="topbar-actions">
                <button class="btn-secondary" onclick="saveScript()">Save Script</button>
                <button class="btn-primary" onclick="generate()">Generate Video</button>
            </div>
        </header>

        <div class="primary-nav">
            <div class="workspace-switch">
                <button class="btn-toggle btn-small" id="btnWorkspaceCrawl" onclick="setWorkspaceView('crawl')">Crawl</button>
                <button class="btn-toggle btn-small is-active" id="btnWorkspaceEditor" onclick="setWorkspaceView('editor')">Editor</button>
                <button class="btn-toggle btn-small" id="btnWorkspaceAgent" onclick="setWorkspaceView('agent')">Agent</button>
            </div>
        </div>

        <div id="workspaceAgent" class="workspace-screen" hidden>
            <div class="agent-studio">

                <!-- TRENDING NOW -->
                <section class="studio-section">
                    <div class="studio-section-header">
                        <div class="studio-section-label">
                            <span class="studio-section-dot is-live"></span>
                            TRENDING NOW
                        </div>
                        <div class="studio-trending-controls">
                            <select id="trendCategory" class="studio-input studio-input-sm">
                                <option value="anime">Anime</option>
                                <option value="gaming">Gaming</option>
                                <option value="tech">Tech</option>
                                <option value="lore">Lore</option>
                                <option value="drama">Drama</option>
                            </select>
                            <div class="trend-view-toggle">
                                <button id="trendViewLive" class="trend-toggle-btn is-active" onclick="switchTrendView('live')">Live</button>
                                <button id="trendViewHistory" class="trend-toggle-btn" onclick="switchTrendView('history')">History <span id="trendHistoryCount" class="trend-history-badge" style="display:none"></span></button>
                            </div>
                            <button id="trendRefreshBtn" class="studio-btn-ghost studio-btn-sm" onclick="loadTrending(true)">
                                <svg id="trendRefreshIcon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.2"/></svg>
                                <svg id="trendSpinner" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="display:none"><circle cx="12" cy="12" r="10" stroke-opacity="0.25"/><path d="M12 2a10 10 0 0 1 10 10"/></svg>
                                <span id="trendRefreshLabel">Refresh</span>
                            </button>
                        </div>
                        <div id="trendStatusBar" style="display:none;font-size:0.72rem;color:var(--text-muted,#666);padding:0.15rem 0.1rem 0;"></div>
                    </div>
                    <div id="trendingCards" class="trending-cards-row">
                        <!-- cards injected by JS -->
                        <div class="trend-skeleton"></div>
                        <div class="trend-skeleton"></div>
                        <div class="trend-skeleton"></div>
                        <div class="trend-skeleton"></div>
                    </div>
                </section>

                <!-- PROMPT -->
                <section class="studio-section">
                    <div class="studio-section-label">PROMPT</div>
                    <div class="prompt-wrap">
                        <textarea id="agentPrompt" class="studio-textarea" rows="4"
                            placeholder="Describe the video you want — topic, angle, tone. The agent will research, write, and render it autonomously."></textarea>
                        <span class="prompt-char-count" id="promptCharCount">0</span>
                    </div>
                </section>

                <!-- CONFIG GRID -->
                <section class="studio-section">
                    <div class="studio-section-label">CONFIGURATION</div>
                    <div class="config-grid">
                        <div class="config-col">
                            <div class="config-field">
                                <label class="config-label" for="agentSkill">SKILL</label>
                                <select id="agentSkill" class="studio-input">
                                    <option value="" selected>Auto</option>
                                </select>
                            </div>
                            <div class="config-field">
                                <label class="config-label" for="agentStyle">STYLE</label>
                                <select id="agentStyle" class="studio-input">
                                    <option value="" selected>Auto</option>
                                    <option value="dramatic">Dramatic</option>
                                    <option value="educational">Educational</option>
                                    <option value="cinematic">Cinematic</option>
                                    <option value="energetic">Energetic</option>
                                </select>
                            </div>
                            <div class="config-field">
                                <label class="config-label" for="agentLanguage">LANGUAGE</label>
                                <select id="agentLanguage" class="studio-input">
                                    <option value="en" selected>English</option>
                                    <option value="vi">Vietnamese</option>
                                    <option value="ja">Japanese</option>
                                    <option value="ko">Korean</option>
                                    <option value="zh">Chinese</option>
                                </select>
                            </div>
                        </div>
                        <div class="config-col">
                            <div class="config-field">
                                <label class="config-label" for="agentVoice">VOICE</label>
                                <select id="agentVoice" class="studio-input">
                                    <option value="" selected>Auto (by language)</option>
                                </select>
                            </div>
                            <div class="config-field">
                                <label class="config-label" for="agentBgmMood">BGM MOOD</label>
                                <select id="agentBgmMood" class="studio-input">
                                    <option value="" selected>Auto</option>
                                    <option value="intense">Intense</option>
                                    <option value="calm">Calm</option>
                                    <option value="mystery">Mystery</option>
                                    <option value="epic">Epic</option>
                                    <option value="emotional">Emotional</option>
                                </select>
                            </div>
                            <div class="config-field">
                                <label class="config-label" for="agentSubtitlePreset">SUBTITLES</label>
                                <select id="agentSubtitlePreset" class="studio-input">
                                    <option value="minimal" selected>Minimal</option>
                                    <option value="energetic">Energetic</option>
                                    <option value="cinematic">Cinematic</option>
                                </select>
                            </div>
                            <div class="config-field config-field-row">
                                <div style="flex:1">
                                    <label class="config-label" for="agentTargetBlocks">BLOCKS</label>
                                    <input id="agentTargetBlocks" class="studio-input" type="number" min="3" max="10" placeholder="Auto">
                                </div>
                                <div style="flex:1">
                                    <label class="config-label" for="agentImageDisplay">IMAGES</label>
                                    <select id="agentImageDisplay" class="studio-input">
                                        <option value="" selected>Auto</option>
                                        <option value="popup">Popup</option>
                                        <option value="background">Background</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- ADVANCED -->
                <details class="studio-advanced">
                    <summary class="studio-advanced-summary">
                        <span class="config-label">ADVANCED</span>
                        <svg class="adv-chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
                    </summary>
                    <div class="adv-grid">
                        <div class="config-field">
                            <label class="config-label" for="agentMaxDdg">MAX DDG RESULTS</label>
                            <input id="agentMaxDdg" class="studio-input" type="number" min="1" max="20" placeholder="8">
                        </div>
                        <div class="config-field">
                            <label class="config-label" for="agentMaxCrawl">MAX CRAWL PAGES</label>
                            <input id="agentMaxCrawl" class="studio-input" type="number" min="1" max="20" placeholder="6">
                        </div>
                        <div class="config-field">
                            <label class="config-label" for="agentMaxFacts">MAX FACTS</label>
                            <input id="agentMaxFacts" class="studio-input" type="number" min="5" max="60" placeholder="30">
                        </div>
                    </div>
                </details>

                <!-- RUN BUTTON -->
                <button class="studio-run-btn" id="agentRunBtn" onclick="runAgent()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                    GENERATE VIDEO
                    <svg class="run-arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
                </button>

                <!-- PIPELINE PROGRESS -->
                <div id="agentProgress" class="pipeline-progress" hidden>
                    <div class="pipeline-track">
                        <div class="pipeline-step" data-phase="plan">
                            <div class="pipeline-step-num">01</div>
                            <div class="pipeline-step-label">PLAN</div>
                            <div class="pipeline-step-bar"></div>
                        </div>
                        <div class="pipeline-connector"></div>
                        <div class="pipeline-step" data-phase="research">
                            <div class="pipeline-step-num">02</div>
                            <div class="pipeline-step-label">RESEARCH</div>
                            <div class="pipeline-step-bar"></div>
                        </div>
                        <div class="pipeline-connector"></div>
                        <div class="pipeline-step" data-phase="script">
                            <div class="pipeline-step-num">03</div>
                            <div class="pipeline-step-label">SCRIPT</div>
                            <div class="pipeline-step-bar"></div>
                        </div>
                        <div class="pipeline-connector"></div>
                        <div class="pipeline-step" data-phase="quality_gate">
                            <div class="pipeline-step-num">04</div>
                            <div class="pipeline-step-label">QA</div>
                            <div class="pipeline-step-bar"></div>
                        </div>
                        <div class="pipeline-connector"></div>
                        <div class="pipeline-step" data-phase="image">
                            <div class="pipeline-step-num">05</div>
                            <div class="pipeline-step-label">IMAGES</div>
                            <div class="pipeline-step-bar"></div>
                        </div>
                        <div class="pipeline-connector"></div>
                        <div class="pipeline-step" data-phase="editor">
                            <div class="pipeline-step-num">06</div>
                            <div class="pipeline-step-label">RENDER</div>
                            <div class="pipeline-step-bar"></div>
                        </div>
                    </div>
                    <div id="agentStatusMsg" class="pipeline-status-msg"></div>
                </div>

                <div id="agentStatus" class="agent-status" hidden></div>

                <!-- VIDEO PREVIEW -->
                <div id="agentVideoWrap" class="agent-video-wrap" hidden>
                    <div class="video-preview-label">OUTPUT</div>
                    <video id="agentPreview" class="agent-preview" controls></video>
                </div>

            </div>
        </div>
        {% include "partials/crawl_screen.html" %}
        {% include "partials/editor_screen.html" %}
    </div>
    {% include "partials/modals.html" %}

    <script>
        window.APP_BOOTSTRAP = {
            VOICES: {{ voices | tojson }},
            SUBTITLE_PRESETS: {{ subtitle_presets | tojson }},
            DEFAULT_SUBTITLE_PRESET: {{ default_subtitle_preset | tojson }},
            DEFAULT_SUBTITLE_ALIGNMENT_MODE: {{ default_subtitle_alignment_mode | tojson }},
            INITIAL_SCRIPTS: {{ scripts | tojson }},
            SKILLS: {{ skills | tojson }},
        };
    </script>
    <script src="{{ url_for('static', filename='js/app_state.js') }}"></script>
    <script src="{{ url_for('static', filename='js/crawl.js') }}"></script>
    <script src="{{ url_for('static', filename='js/output.js') }}"></script>
    <script src="{{ url_for('static', filename='js/blocks.js') }}"></script>
    <script src="{{ url_for('static', filename='js/scripts.js') }}"></script>
    <script src="{{ url_for('static', filename='js/generate.js') }}"></script>
    <script>
        (function () {
            let agentPollTimer = null;

            const PHASE_LABELS = {
                plan: 'Planning',
                research: 'Researching',
                script: 'Writing Script',
                quality_gate: 'Quality Check',
                image: 'Finding Images',
                editor: 'Rendering',
                done: 'Complete',
                failed: 'Failed',
            };

            // ── Voice dropdown ──
            function initAgentVoices() {
                const sel = document.getElementById('agentVoice');
                if (!sel || !window.APP_BOOTSTRAP?.VOICES) return;
                for (const [name, id] of Object.entries(window.APP_BOOTSTRAP.VOICES)) {
                    const opt = document.createElement('option');
                    opt.value = name;
                    opt.textContent = name + ' (' + (id.includes('vi-VN') ? 'Vietnamese' : 'English') + ')';
                    sel.appendChild(opt);
                }
            }

            // ── Skill dropdown ──
            function initAgentSkills() {
                const sel = document.getElementById('agentSkill');
                if (!sel || !Array.isArray(window.APP_BOOTSTRAP?.SKILLS)) return;
                for (const skill of window.APP_BOOTSTRAP.SKILLS) {
                    const opt = document.createElement('option');
                    opt.value = skill.id;
                    opt.textContent = skill.name || skill.id;
                    sel.appendChild(opt);
                }
            }

            // ── Prompt char counter ──
            function initCharCounter() {
                const ta = document.getElementById('agentPrompt');
                const counter = document.getElementById('promptCharCount');
                if (!ta || !counter) return;
                const update = () => { counter.textContent = ta.value.length; };
                ta.addEventListener('input', update);
                update();
            }

            // ── Trending cards ──
            window.loadTrending = async function (forceRefresh) {
                const container = document.getElementById('trendingCards');
                const category = document.getElementById('trendCategory')?.value || 'anime';
                const btn = document.getElementById('trendRefreshBtn');
                const icon = document.getElementById('trendRefreshIcon');
                const spinner = document.getElementById('trendSpinner');
                const label = document.getElementById('trendRefreshLabel');
                const statusBar = document.getElementById('trendStatusBar');
                if (!container) return;

                // Loading state
                if (btn) btn.disabled = true;
                if (icon) icon.style.display = 'none';
                if (spinner) { spinner.style.display = 'inline'; }
                if (label) label.textContent = 'Fetching…';
                if (statusBar) { statusBar.style.display = 'block'; statusBar.textContent = 'Fetching trending topics…'; }
                container.innerHTML = Array(4).fill('<div class="trend-skeleton"></div>').join('');

                const t0 = Date.now();
                try {
                    const url = '/api/trending?category=' + encodeURIComponent(category) + '&limit=8'
                        + (forceRefresh ? '&refresh=1' : '');
                    const res = await fetch(url);
                    if (!res.ok) throw new Error('HTTP ' + res.status);
                    const data = await res.json();
                    const topics = data.topics || [];
                    const elapsed = ((Date.now() - t0) / 1000).toFixed(1);

                    if (!topics.length) {
                        container.innerHTML = '<div class="trend-empty">No trending topics found.</div>';
                        if (statusBar) statusBar.textContent = 'No results — try a different category.';
                        return;
                    }

                    container.innerHTML = '';
                    topics.forEach(function (topic) {
                        const urgencyClass = (topic.urgency_score >= 0.7) ? 'is-hot' : '';
                        const card = document.createElement('div');
                        card.className = 'trend-card';
                        card.innerHTML =
                            '<div class="trend-card-urgency ' + urgencyClass + '"></div>' +
                            '<div class="trend-card-title">' + escHtml(topic.title || '') + '</div>' +
                            (topic.trending_reason ? '<div class="trend-card-reason">' + escHtml(topic.trending_reason) + '</div>' : '') +
                            '<div class="trend-card-angle">' + escHtml(topic.video_angle || '') + '</div>' +
                            (topic.hook_idea ? '<div class="trend-card-hook">' + escHtml(topic.hook_idea) + '</div>' : '') +
                            '<span class="trend-card-skill">' + escHtml(topic.skill_id || '') + '</span>';
                        card.addEventListener('click', function () { fillFromTrend(topic); });
                        container.appendChild(card);
                    });
                    const now = new Date().toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'});
                    if (statusBar) statusBar.textContent = topics.length + ' topics loaded in ' + elapsed + 's · updated ' + now;
                    // Refresh history badge count
                    fetch('/api/trending/history').then(function(r){ return r.json(); }).then(function(d){
                        const badge = document.getElementById('trendHistoryCount');
                        if (badge && d.total > 0) { badge.textContent = d.total; badge.style.display = 'inline'; }
                    }).catch(function(){});
                } catch (e) {
                    container.innerHTML = '<div class="trend-empty">Could not load trending topics.</div>';
                    if (statusBar) statusBar.textContent = 'Failed to load — check server logs.';
                } finally {
                    if (btn) btn.disabled = false;
                    if (icon) icon.style.display = 'inline';
                    if (spinner) spinner.style.display = 'none';
                    if (label) label.textContent = 'Refresh';
                }
            };

            window._activeTrendTopic = null;

            window.fillFromTrend = function (topic) {
                const ta = document.getElementById('agentPrompt');
                if (ta) {
                    const angle = topic.video_angle || '';
                    const title = topic.title || '';
                    ta.value = title && angle && !angle.toLowerCase().includes(title.toLowerCase().slice(0, 10))
                        ? title + ' — ' + angle
                        : (angle || title);
                    ta.dispatchEvent(new Event('input'));
                    // Clear active topic if user manually edits the prompt
                    ta.addEventListener('input', function clearTrend() {
                        window._activeTrendTopic = null;
                        ta.removeEventListener('input', clearTrend);
                    }, { once: true });
                }
                const skillSel = document.getElementById('agentSkill');
                if (skillSel && topic.skill_id) {
                    const opt = skillSel.querySelector('option[value="' + topic.skill_id + '"]');
                    if (opt) skillSel.value = topic.skill_id;
                }
                window._activeTrendTopic = topic;
                // Show indicator that trend topic is active
                const statusBar = document.getElementById('trendStatusBar');
                if (statusBar) { statusBar.style.display = 'block'; statusBar.textContent = 'Selected: ' + (topic.title || topic.video_angle) + ' — will use pre-built search queries'; }
            };

            function escHtml(s) {
                return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
            }

            // ── View toggle (live / history) ──
            var _trendView = 'live';
            window.switchTrendView = function (view) {
                _trendView = view;
                document.getElementById('trendViewLive').classList.toggle('is-active', view === 'live');
                document.getElementById('trendViewHistory').classList.toggle('is-active', view === 'history');
                const refreshBtn = document.getElementById('trendRefreshBtn');
                if (refreshBtn) refreshBtn.style.display = view === 'live' ? '' : 'none';
                if (view === 'history') loadTrendingHistory();
                else loadTrending(false);
            };

            window.loadTrendingHistory = async function () {
                const container = document.getElementById('trendingCards');
                const statusBar = document.getElementById('trendStatusBar');
                const category = document.getElementById('trendCategory')?.value || '';
                if (!container) return;
                container.innerHTML = Array(4).fill('<div class="trend-skeleton"></div>').join('');
                try {
                    const url = '/api/trending/history' + (category ? '?category=' + encodeURIComponent(category) : '');
                    const res = await fetch(url);
                    const data = await res.json();
                    const topics = data.topics || [];
                    if (!topics.length) {
                        container.innerHTML = '<div class="trend-empty">No saved topics yet — fetch trending to populate history.</div>';
                        if (statusBar) { statusBar.style.display = 'block'; statusBar.textContent = '0 saved topics'; }
                        return;
                    }
                    container.innerHTML = '';
                    topics.forEach(function (topic) {
                        const card = document.createElement('div');
                        const isUsed = !!topic.used;
                        card.className = 'trend-card' + (isUsed ? ' is-used' : '');
                        const usedAt = topic.used_at ? new Date(topic.used_at * 1000).toLocaleDateString() : '';
                        card.innerHTML =
                            '<div class="trend-card-urgency"></div>' +
                            (isUsed ? '<span class="trend-used-badge">Used ' + usedAt + '</span>' : '') +
                            '<div class="trend-card-title">' + escHtml(topic.title || '') + '</div>' +
                            (topic.trending_reason ? '<div class="trend-card-reason">' + escHtml(topic.trending_reason) + '</div>' : '') +
                            '<div class="trend-card-angle">' + escHtml(topic.video_angle || '') + '</div>' +
                            '<span class="trend-card-skill">' + escHtml(topic.skill_id || '') + '</span>' +
                            '<span class="trend-card-category">' + escHtml(topic.category || '') + '</span>';
                        card.addEventListener('click', function () { fillFromTrend(topic); });
                        container.appendChild(card);
                    });
                    const unused = topics.filter(function (t) { return !t.used; }).length;
                    if (statusBar) { statusBar.style.display = 'block'; statusBar.textContent = topics.length + ' saved · ' + unused + ' unused · ' + (topics.length - unused) + ' used'; }
                    const badge = document.getElementById('trendHistoryCount');
                    if (badge) { badge.textContent = topics.length; badge.style.display = 'inline'; }
                } catch (e) {
                    container.innerHTML = '<div class="trend-empty">Could not load history.</div>';
                }
            };

            // ── Category change triggers reload ──
            function initTrendCategory() {
                const sel = document.getElementById('trendCategory');
                if (sel) sel.addEventListener('change', function () {
                    if (_trendView === 'history') loadTrendingHistory();
                    else loadTrending(false);
                });
            }

            // ── Init on DOM ready ──
            function onReady() {
                initAgentVoices();
                initAgentSkills();
                initCharCounter();
                initTrendCategory();
                loadTrending(false);
            }
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', onReady);
            } else {
                onReady();
            }

            // ── Status / phase helpers ──
            function agentSetStatus(msg, type) {
                const el = document.getElementById('agentStatus');
                if (!el) return;
                el.hidden = false;
                el.textContent = msg;
                el.className = 'agent-status agent-status-' + (type || 'processing');
            }

            function agentSetPhase(phase, jobData) {
                const progressEl = document.getElementById('agentProgress');
                if (!progressEl) return;
                progressEl.hidden = false;
                const order = ['plan', 'research', 'script', 'quality_gate', 'image', 'editor'];
                const currentIdx = order.indexOf(phase);
                progressEl.querySelectorAll('.pipeline-step').forEach(function (step) {
                    const stepPhase = step.dataset.phase;
                    const stepIdx = order.indexOf(stepPhase);
                    step.classList.remove('is-active', 'is-done', 'qa-pass', 'qa-warn', 'qa-fail');
                    if (stepIdx < currentIdx) step.classList.add('is-done');
                    if (stepIdx === currentIdx) step.classList.add('is-active');
                    // QA score label
                    if (stepPhase === 'quality_gate') {
                        const lbl = step.querySelector('.pipeline-step-label');
                        if (lbl && jobData && jobData.yes_count != null) {
                            lbl.textContent = 'QA ' + jobData.yes_count + '/5';
                            step.classList.remove('qa-pass', 'qa-warn', 'qa-fail');
                            if (jobData.yes_count >= 4) step.classList.add('qa-pass');
                            else if (jobData.yes_count >= 3) step.classList.add('qa-warn');
                            else step.classList.add('qa-fail');
                        } else if (lbl && jobData && jobData.yes_count == null && jobData.stage === 'quality_gate') {
                            lbl.textContent = 'QA —';
                        }
                    }
                });
            }

            function agentSetRunning(running) {
                const btn = document.getElementById('agentRunBtn');
                if (!btn) return;
                btn.disabled = running;
                if (running) {
                    btn.innerHTML =
                        '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="animation:spin 1s linear infinite"><path d="M21 12a9 9 0 1 1-6.22-8.56"/></svg>' +
                        'RUNNING...';
                } else {
                    btn.innerHTML =
                        '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>' +
                        'GENERATE VIDEO' +
                        '<svg class="run-arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>';
                }
            }

            function agentStopPolling() {
                if (agentPollTimer) { clearTimeout(agentPollTimer); agentPollTimer = null; }
            }

            function agentPollJob(jobId) {
                agentStopPolling();
                const poll = async function () {
                    try {
                        const job = await fetchApi(
                            '/api/jobs/' + encodeURIComponent(jobId),
                            {},
                            'Failed to fetch job status.'
                        );
                        const stage = job.stage || '';
                        const phaseLabel = PHASE_LABELS[stage] || stage;
                        const progress = job.progress || 'Processing...';
                        const blockInfo = (job.current_block != null && job.total_blocks != null)
                            ? ' (' + job.current_block + '/' + job.total_blocks + ')' : '';

                        if (job.status === 'done') {
                            agentSetStatus('Video ready!', 'done');
                            agentSetPhase('done');
                            agentSetRunning(false);
                            if (job.output) {
                                const wrap = document.getElementById('agentVideoWrap');
                                const video = document.getElementById('agentPreview');
                                if (wrap && video) {
                                    video.src = '/output/' + encodeURIComponent(job.output);
                                    video.load();
                                    wrap.hidden = false;
                                }
                            }
                            loadOutputs();
                            return;
                        }
                        if (job.status === 'error') {
                            const errMsg = job.error || 'Something went wrong. Check the prompt and try again.';
                            const cleanErr = errMsg.split('\n')[0].replace(/^.*Error:\s*/, '');
                            agentSetStatus('Error: ' + cleanErr, 'error');
                            agentSetRunning(false);
                            const progressEl = document.getElementById('agentProgress');
                            if (progressEl) progressEl.hidden = true;
                            return;
                        }
                        agentSetPhase(stage, job);
                        const msgEl = document.getElementById('agentStatusMsg');
                        if (msgEl) msgEl.textContent = progress + blockInfo;
                        agentSetStatus(phaseLabel + ': ' + progress + blockInfo, 'processing');
                        agentPollTimer = setTimeout(poll, 2000);
                    } catch (err) {
                        agentSetStatus('Lost connection. Retrying...', 'error');
                        agentPollTimer = setTimeout(poll, 5000);
                    }
                };
                poll();
            }

            window.runAgent = async function () {
                const prompt = (document.getElementById('agentPrompt')?.value || '').trim();
                if (!prompt) { agentSetStatus('Please enter a prompt.', 'error'); return; }

                const style        = document.getElementById('agentStyle')?.value || '';
                const imageDisplay = document.getElementById('agentImageDisplay')?.value || '';
                const voice        = document.getElementById('agentVoice')?.value || '';
                const skillId      = document.getElementById('agentSkill')?.value || '';
                const targetBlocks = document.getElementById('agentTargetBlocks')?.value || '';
                const bgmMood        = document.getElementById('agentBgmMood')?.value || '';
                const language       = document.getElementById('agentLanguage')?.value || '';
                const subtitlePreset = document.getElementById('agentSubtitlePreset')?.value || '';

                agentStopPolling();
                agentSetRunning(true);
                agentSetStatus('Starting agent...', 'processing');
                agentSetPhase('plan');

                const wrap = document.getElementById('agentVideoWrap');
                if (wrap) wrap.hidden = true;

                const body = { prompt };
                if (style)        body.style = style;
                if (imageDisplay) body.image_display = imageDisplay;
                if (voice)        body.voice = voice;
                if (skillId)      body.skill_id = skillId;
                if (targetBlocks) body.target_blocks = parseInt(targetBlocks, 10);
                if (bgmMood)        body.bgm_mood = bgmMood;
                if (language)       body.language = language;
                if (subtitlePreset) body.subtitle_preset = subtitlePreset;

                try {
                    let endpoint = '/api/agent/run';
                    if (window._activeTrendTopic) {
                        const t = window._activeTrendTopic;
                        body.title = t.title || '';
                        body.search_queries = t.search_queries || [];
                        body.video_angle = t.video_angle || prompt;
                        endpoint = '/api/trending/generate';
                        window._activeTrendTopic = null;
                    }
                    const result = await fetchApi(endpoint, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(body),
                    }, 'Failed to start agent.');
                    agentSetStatus('Planning...', 'processing');
                    agentPollJob(result.job_id);
                } catch (err) {
                    const msg = (err && err.message) ? err.message : 'Failed to start agent.';
                    agentSetStatus('Error: ' + msg, 'error');
                    agentSetRunning(false);
                }
            };
        })();
    </script>
